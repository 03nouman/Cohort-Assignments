<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScaleX</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">
          <svg
            viewBox="0 0 32 32"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M20 4L6 18H16L12 28L26 14H16L20 4Z" fill="white" />
          </svg>
          <span> ScaleX</span>
        </div>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Services</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
        <button>Get Started</button>
      </nav>
    </header>

    <section>
      <h1>Insights &amp; Blogs</h1>
    </section>

    <div class="wrap">
      <div class="filters">
        <button class="filter-pill active">All</button>
        <button class="filter-pill">Tech</button>
        <button class="filter-pill">SaaS</button>
        <button class="filter-pill">Marketing</button>
      </div>

      <div class="grid">
        <article class="card">
          <div class="card-media">
            <img src="./assets/glass-img.png" alt="" srcset="" />
          </div>
          <div class="card-body">
            <span class="tag tech">Tech</span>
            <h3>The Ultimate Guide To SaaS Marketing</h3>
            <span class="date">May 23, 2025</span>
          </div>
        </article>

        <article class="card">
          <div class="card-media">
            <img src="./assets/chair-img.png" alt="" />
          </div>
          <div class="card-body">
            <span class="tag saas">SaaS</span>
            <h3>5 Key Trends In SaaS Growth For 2025</h3>
            <span class="date">May 23, 2025</span>
          </div>
        </article>

        <article class="card">
          <div class="card-media">
            <img src="./assets/cat-img.png" alt="" srcset="" />
          </div>
          <div class="card-body">
            <span class="tag marketing">Marketing</span>
            <h3>How Data-Driven Strategies Are Important</h3>
            <span class="date">May 23, 2025</span>
          </div>
        </article>
      </div>
    </div>
  </body>
</html>
